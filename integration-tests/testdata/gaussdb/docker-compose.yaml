services:
  gaussdb:
    image: opengauss/opengauss:7.0.0-RC1
    container_name: gaussdb-test
    environment:
      GS_PASSWORD: Secret@1234
      GS_USERNAME: gaussdb
      GS_PORT: 5432
    ports:
      - "5433:5432"
    volumes:
      - ./opengauss_init.sql:/docker-entrypoint-initdb.d/init.sql
